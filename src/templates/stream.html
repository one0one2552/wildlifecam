<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wildlife Cam — Live Stream</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; --red: #f85149; --text: #e6edf3; --muted: #8b949e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1rem; }
  .btn { padding: .4rem 1rem; border-radius: .4rem; border: none; cursor: pointer; font-weight: 600; font-size: .85rem; }
  .btn-muted { background: var(--border); color: var(--text); }
  .btn-danger { background: var(--red); color: #fff; }
  #streamWrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
  #streamImg { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
  #streamPlaceholder { color: var(--muted); font-size: 1.1rem; }
  #status { position: absolute; top: .75rem; left: .75rem; background: rgba(0,0,0,.6); color: var(--accent); font-size: .75rem; padding: .25rem .6rem; border-radius: .3rem; }
  #watchdogBar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); transition: width 1s linear; }
</style>
</head>
<body>

<header>
  <a href="/" style="color:var(--muted); text-decoration:none">← Dashboard</a>
  <h1>🔴 Live Stream</h1>
  <span id="streamState" style="color:var(--muted); font-size:.85rem">Connecting…</span>
  <button class="btn btn-danger" onclick="stopStream()" style="margin-left:auto">■ Stop</button>
</header>

<div id="streamWrap">
  <img id="streamImg" alt="Live feed">
  <div id="streamPlaceholder">Starting camera…</div>
  <div id="status"></div>
  <div id="watchdogBar" style="width:100%"></div>
</div>

<script>
const img = document.getElementById('streamImg');
const placeholder = document.getElementById('streamPlaceholder');
const stateEl = document.getElementById('streamState');
const statusEl = document.getElementById('status');
const watchdogBar = document.getElementById('watchdogBar');

const WATCHDOG_SECS = 180;
let watchdogStart = null;

function startStream() {
  img.onload = () => {
    placeholder.style.display = 'none';
    img.style.display = 'block';
    stateEl.textContent = '● LIVE';
    stateEl.style.color = '#f85149';
    watchdogStart = Date.now();
    tickWatchdog();
  };
  img.onerror = () => {
    stateEl.textContent = 'Stream error';
    placeholder.style.display = 'block';
    img.style.display = 'none';
  };
  img.src = '/video_feed';
}

function tickWatchdog() {
  if (!watchdogStart) return;
  const elapsed = (Date.now() - watchdogStart) / 1000;
  const remaining = Math.max(0, WATCHDOG_SECS - elapsed);
  const pct = (remaining / WATCHDOG_SECS) * 100;
  watchdogBar.style.width = pct + '%';
  statusEl.textContent = `Watchdog: ${Math.ceil(remaining)}s remaining`;
  if (remaining > 0) setTimeout(tickWatchdog, 1000);
  else stateEl.textContent = 'Watchdog expired — reverting';
}

async function stopStream() {
  img.src = '';
  await fetch('/api/stream/stop', { method: 'POST' });
  window.location.href = '/';
}

// Stop stream if user navigates away
window.addEventListener('beforeunload', () => {
  navigator.sendBeacon('/api/stream/stop');
});

startStream();
</script>
</body>
</html>
